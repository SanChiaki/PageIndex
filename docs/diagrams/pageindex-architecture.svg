<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 880" width="1440" height="880">
  <style>
    text {
      font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      fill: #111827;
    }
    .title { font-size: 28px; font-weight: 700; }
    .subtitle { font-size: 15px; fill: #4b5563; }
    .lane-label { font-size: 18px; font-weight: 700; }
    .lane-sub { font-size: 12px; fill: #6b7280; }
    .box-title { font-size: 15px; font-weight: 700; }
    .box-sub { font-size: 12px; fill: #6b7280; }
    .pill-text { font-size: 13px; font-weight: 700; }
    .label { font-size: 12px; fill: #374151; font-weight: 600; }
    .legend { font-size: 12px; fill: #6b7280; }
    .callout { font-size: 12px; fill: #374151; }
  </style>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <rect width="1440" height="880" fill="#ffffff"/>

  <text class="title" x="40" y="42">PageIndex 架构与工作原理</text>
  <text class="subtitle" x="40" y="68">核心思想：先把长文档变成可推理的目录树，再让 Agent 沿树定位页码，只读取需要的页面片段。</text>

  <rect x="1030" y="20" width="360" height="38" rx="19" ry="19" fill="#eff6ff" stroke="#bfdbfe"/>
  <text class="pill-text" x="1210" y="45" text-anchor="middle" fill="#1d4ed8">Vectorless RAG  ·  No Vector DB  ·  No Chunking</text>

  <rect x="30" y="92" width="1380" height="316" rx="18" ry="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="8 6"/>
  <text class="lane-label" x="52" y="121">离线建索引</text>
  <text class="lane-sub" x="52" y="142">入口：run_pageindex.py / page_index.py / page_index_md.py</text>

  <rect x="30" y="450" width="1380" height="310" rx="18" ry="18" fill="#fcfcff" stroke="#d8dbe5" stroke-width="1.5" stroke-dasharray="8 6"/>
  <text class="lane-label" x="52" y="480">在线检索与问答</text>
  <text class="lane-sub" x="52" y="501">入口：PageIndexClient / retrieve.py / examples/agentic_vectorless_rag_demo.py</text>

  <rect x="520" y="112" width="780" height="46" rx="12" ry="12" fill="#fff7ed" stroke="#fdba74" filter="url(#shadow)"/>
  <text class="box-title" x="910" y="141" text-anchor="middle" fill="#9a3412">LiteLLM / LLM 推理层</text>

  <rect x="60" y="180" width="170" height="92" rx="12" ry="12" fill="#eff6ff" stroke="#bfdbfe" filter="url(#shadow)"/>
  <text class="box-title" x="145" y="208" text-anchor="middle">PDF / Markdown</text>
  <text class="box-title" x="145" y="228" text-anchor="middle">原始文档</text>
  <text class="box-sub" x="145" y="249" text-anchor="middle">长文档输入</text>

  <rect x="280" y="180" width="180" height="92" rx="12" ry="12" fill="#eff6ff" stroke="#bfdbfe" filter="url(#shadow)"/>
  <text class="box-title" x="370" y="208" text-anchor="middle">页面 / 标题解析</text>
  <text class="box-sub" x="370" y="229" text-anchor="middle">PDF: extract_text + token_count</text>
  <text class="box-sub" x="370" y="247" text-anchor="middle">MD: # 标题 + line_num</text>

  <rect x="520" y="160" width="180" height="84" rx="12" ry="12" fill="#f0fdfa" stroke="#99f6e4" filter="url(#shadow)"/>
  <text class="box-title" x="610" y="188" text-anchor="middle">目录检测 / 利用 TOC</text>
  <text class="box-sub" x="610" y="209" text-anchor="middle">check_toc() / find_toc_pages()</text>
  <text class="box-sub" x="610" y="227" text-anchor="middle">toc_extractor() / toc_transformer()</text>

  <rect x="520" y="274" width="180" height="84" rx="12" ry="12" fill="#fff7ed" stroke="#fdba74" filter="url(#shadow)"/>
  <text class="box-title" x="610" y="302" text-anchor="middle">无目录时重建结构</text>
  <text class="box-sub" x="610" y="323" text-anchor="middle">process_no_toc()</text>
  <text class="box-sub" x="610" y="341" text-anchor="middle">generate_toc_init() / continue()</text>

  <rect x="760" y="180" width="190" height="92" rx="12" ry="12" fill="#fef2f2" stroke="#fecaca" filter="url(#shadow)"/>
  <text class="box-title" x="855" y="208" text-anchor="middle">页码校验与修复</text>
  <text class="box-sub" x="855" y="229" text-anchor="middle">verify_toc()</text>
  <text class="box-sub" x="855" y="247" text-anchor="middle">fix_incorrect_toc_with_retries()</text>

  <rect x="1000" y="180" width="190" height="92" rx="12" ry="12" fill="#faf5ff" stroke="#ddd6fe" filter="url(#shadow)"/>
  <text class="box-title" x="1095" y="208" text-anchor="middle">递归细分大节点</text>
  <text class="box-sub" x="1095" y="229" text-anchor="middle">process_large_node_recursively()</text>
  <text class="box-sub" x="1095" y="247" text-anchor="middle">超过页数 / token 阈值再下钻</text>

  <rect x="1230" y="180" width="150" height="92" rx="12" ry="12" fill="#f0fdf4" stroke="#bbf7d0" filter="url(#shadow)"/>
  <text class="box-title" x="1305" y="208" text-anchor="middle">索引增强</text>
  <text class="box-sub" x="1305" y="229" text-anchor="middle">node_id / text</text>
  <text class="box-sub" x="1305" y="247" text-anchor="middle">summary / description</text>

  <rect x="248" y="300" width="190" height="54" rx="10" ry="10" fill="#ffffff" stroke="#d1d5db"/>
  <text class="callout" x="343" y="321" text-anchor="middle">Markdown 分支更简单：</text>
  <text class="callout" x="343" y="340" text-anchor="middle">直接按标题层级建树，可选 thinning</text>

  <path d="M 230 226 L 280 226" stroke="#2563eb" stroke-width="2.4" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M 460 204 L 520 202" stroke="#2563eb" stroke-width="2.4" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="473" y="184" width="44" height="20" rx="10" ry="10" fill="#ffffff"/>
  <text class="label" x="495" y="198" text-anchor="middle">前 N 页</text>

  <path d="M 460 246 C 490 246 488 316 520 316" stroke="#6b7280" stroke-width="2" fill="none" stroke-dasharray="5 4" marker-end="url(#arrow-gray)"/>
  <rect x="466" y="274" width="72" height="20" rx="10" ry="10" fill="#ffffff"/>
  <text class="label" x="502" y="288" text-anchor="middle">全文 + 页标签</text>

  <path d="M 700 202 L 760 226" stroke="#2563eb" stroke-width="2.4" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="708" y="189" width="56" height="20" rx="10" ry="10" fill="#ffffff"/>
  <text class="label" x="736" y="203" text-anchor="middle">目录分支</text>

  <path d="M 700 316 L 760 235" stroke="#2563eb" stroke-width="2.4" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="706" y="300" width="72" height="20" rx="10" ry="10" fill="#ffffff"/>
  <text class="label" x="742" y="314" text-anchor="middle">无目录分支</text>

  <path d="M 950 226 L 1000 226" stroke="#2563eb" stroke-width="2.4" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M 1190 226 L 1230 226" stroke="#2563eb" stroke-width="2.4" fill="none" marker-end="url(#arrow-blue)"/>

  <path d="M 1305 272 L 1305 520" stroke="#059669" stroke-width="2.2" fill="none" stroke-dasharray="6 4" marker-end="url(#arrow-green)"/>
  <rect x="1242" y="386" width="126" height="22" rx="11" ry="11" fill="#ffffff"/>
  <text class="label" x="1305" y="401" text-anchor="middle">写入 structure / pages / meta</text>

  <path d="M 610 158 L 610 160" stroke="#ea580c" stroke-width="2" fill="none" stroke-dasharray="5 4" marker-end="url(#arrow-orange)"/>
  <path d="M 610 158 L 610 274" stroke="#ea580c" stroke-width="2" fill="none" stroke-dasharray="5 4" marker-end="url(#arrow-orange)"/>
  <path d="M 855 158 L 855 180" stroke="#ea580c" stroke-width="2" fill="none" stroke-dasharray="5 4" marker-end="url(#arrow-orange)"/>
  <path d="M 1095 158 L 1095 180" stroke="#ea580c" stroke-width="2" fill="none" stroke-dasharray="5 4" marker-end="url(#arrow-orange)"/>
  <path d="M 1305 158 L 1305 180" stroke="#ea580c" stroke-width="2" fill="none" stroke-dasharray="5 4" marker-end="url(#arrow-orange)"/>

  <rect x="500" y="520" width="500" height="220" rx="16" ry="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="7 5"/>
  <text class="lane-sub" x="520" y="544">PageIndexClient / retrieve.py</text>

  <rect x="60" y="580" width="170" height="92" rx="12" ry="12" fill="#eff6ff" stroke="#bfdbfe" filter="url(#shadow)"/>
  <text class="box-title" x="145" y="608" text-anchor="middle">用户问题</text>
  <text class="box-sub" x="145" y="629" text-anchor="middle">例如“解释某个概念”</text>
  <text class="box-sub" x="145" y="647" text-anchor="middle">或“某条规定在哪几页”</text>

  <rect x="280" y="580" width="180" height="92" rx="12" ry="12" fill="#eff6ff" stroke="#bfdbfe" filter="url(#shadow)"/>
  <text class="box-title" x="370" y="608" text-anchor="middle">检索 Agent</text>
  <text class="box-sub" x="370" y="629" text-anchor="middle">OpenAI Agents SDK</text>
  <text class="box-sub" x="370" y="647" text-anchor="middle">使用 retrieve_model</text>

  <rect x="540" y="562" width="170" height="70" rx="12" ry="12" fill="#f0fdf4" stroke="#bbf7d0" filter="url(#shadow)"/>
  <text class="box-title" x="625" y="589" text-anchor="middle">元数据 / 结构工具</text>
  <text class="box-sub" x="625" y="608" text-anchor="middle">get_document()</text>
  <text class="box-sub" x="625" y="624" text-anchor="middle">get_document_structure()</text>

  <rect x="780" y="548" width="180" height="84" rx="12" ry="12" fill="#faf5ff" stroke="#ddd6fe" filter="url(#shadow)"/>
  <text class="box-title" x="870" y="576" text-anchor="middle">Tree Search</text>
  <text class="box-sub" x="870" y="597" text-anchor="middle">先看目录树，再推理相关 node</text>
  <text class="box-sub" x="870" y="615" text-anchor="middle">定位 page range，而不是向量相似度</text>

  <rect x="780" y="648" width="180" height="72" rx="12" ry="12" fill="#f0fdf4" stroke="#bbf7d0" filter="url(#shadow)"/>
  <text class="box-title" x="870" y="676" text-anchor="middle">页面内容工具</text>
  <text class="box-sub" x="870" y="695" text-anchor="middle">get_page_content("x-y")</text>
  <text class="box-sub" x="870" y="711" text-anchor="middle">只拉小范围页文本</text>

  <rect x="1030" y="580" width="150" height="92" rx="12" ry="12" fill="#eff6ff" stroke="#bfdbfe" filter="url(#shadow)"/>
  <text class="box-title" x="1105" y="608" text-anchor="middle">最终回答</text>
  <text class="box-sub" x="1105" y="629" text-anchor="middle">基于真实页文本</text>
  <text class="box-sub" x="1105" y="647" text-anchor="middle">可解释、可追溯</text>

  <g filter="url(#shadow)">
    <ellipse cx="1270" cy="540" rx="90" ry="18" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <rect x="1180" y="540" width="180" height="148" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <ellipse cx="1270" cy="688" rx="90" ry="18" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text class="box-title" x="1270" y="575" text-anchor="middle">Workspace JSON 缓存</text>
    <text class="box-sub" x="1270" y="598" text-anchor="middle">doc_id.json + _meta.json</text>
    <text class="box-sub" x="1270" y="617" text-anchor="middle">structure[] / pages[]</text>
    <text class="box-sub" x="1270" y="636" text-anchor="middle">必要时可回退原始 PDF</text>
  </g>

  <path d="M 230 626 L 280 626" stroke="#2563eb" stroke-width="2.4" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M 460 598 L 540 598" stroke="#2563eb" stroke-width="2.4" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="468" y="579" width="68" height="20" rx="10" ry="10" fill="#ffffff"/>
  <text class="label" x="502" y="593" text-anchor="middle">先看结构</text>

  <path d="M 710 598 L 780 590" stroke="#2563eb" stroke-width="2.4" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="717" y="578" width="62" height="20" rx="10" ry="10" fill="#ffffff"/>
  <text class="label" x="748" y="592" text-anchor="middle">目录树</text>

  <path d="M 870 632 L 870 648" stroke="#2563eb" stroke-width="2.4" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="811" y="631" width="118" height="20" rx="10" ry="10" fill="#ffffff"/>
  <text class="label" x="870" y="645" text-anchor="middle">锁定紧凑页段</text>

  <path d="M 780 684 C 650 684 560 648 460 630" stroke="#2563eb" stroke-width="2.4" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="595" y="676" width="96" height="20" rx="10" ry="10" fill="#ffffff"/>
  <text class="label" x="643" y="690" text-anchor="middle">精确页文本</text>

  <path d="M 460 626 L 1030 626" stroke="#2563eb" stroke-width="2.4" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="728" y="607" width="74" height="20" rx="10" ry="10" fill="#ffffff"/>
  <text class="label" x="765" y="621" text-anchor="middle">证据整合</text>

  <path d="M 1180 580 L 710 580" stroke="#059669" stroke-width="2.2" fill="none" marker-end="url(#arrow-green)"/>
  <rect x="926" y="560" width="140" height="20" rx="10" ry="10" fill="#ffffff"/>
  <text class="label" x="996" y="574" text-anchor="middle">doc info + structure JSON</text>

  <path d="M 1180 666 L 960 684" stroke="#059669" stroke-width="2.2" fill="none" marker-end="url(#arrow-green)"/>
  <rect x="1012" y="649" width="112" height="20" rx="10" ry="10" fill="#ffffff"/>
  <text class="label" x="1068" y="663" text-anchor="middle">pages[] / PDF 回读</text>

  <rect x="1018" y="706" width="180" height="34" rx="10" ry="10" fill="#fff7ed" stroke="#fdba74"/>
  <text class="callout" x="1108" y="728" text-anchor="middle">关键约束：永远不要一次性拉整篇文档</text>

  <rect x="36" y="790" width="414" height="64" rx="12" ry="12" fill="#ffffff" stroke="#e5e7eb"/>
  <line x1="58" y1="812" x2="96" y2="812" stroke="#2563eb" stroke-width="2.4" marker-end="url(#arrow-blue)"/>
  <text class="legend" x="108" y="816">主数据流：文档、结构树、页文本</text>
  <line x1="58" y1="832" x2="96" y2="832" stroke="#ea580c" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrow-orange)"/>
  <text class="legend" x="108" y="836">LLM 推理：TOC 检测、结构抽取、校验修复、摘要</text>
  <line x1="58" y1="852" x2="96" y2="852" stroke="#059669" stroke-width="2.2" stroke-dasharray="6 4" marker-end="url(#arrow-green)"/>
  <text class="legend" x="108" y="856">缓存读写：workspace JSON、pages、meta</text>

  <rect x="492" y="790" width="888" height="64" rx="12" ry="12" fill="#f8fafc" stroke="#e5e7eb"/>
  <text class="callout" x="514" y="816">工作原理总结：</text>
  <text class="callout" x="514" y="838">1) 建索引阶段把长文档压缩成“目录树 + 页码边界 + 摘要”；2) 检索阶段只让模型先看树，再决定要读哪些页；</text>
  <text class="callout" x="514" y="856">3) 因为回答直接来自最终取回的页文本，所以比向量召回更可解释，也更适合长而专业的文档。</text>
</svg>
