services:
  web:
    build: .
    command: ["sh", "./docker/entrypoints/web.sh"]
    ports:
      - "3000:3000"
    environment:
      APP_VAR_ROOT: ${APP_VAR_ROOT:-/app/var}
      APP_DB_PATH: ${APP_DB_PATH:-/app/var/app.db}
      APP_UPLOAD_ROOT: ${APP_UPLOAD_ROOT:-/app/var/uploads}
      RETRIEVAL_API_BASE_URL: http://retrieval-api:8001
      PROJECTS_ROOT: /data/projects
    volumes:
      - ./var:/app/var
      - ${PROJECTS_ROOT:-./fixtures/projects}:/data/projects:ro
    depends_on:
      retrieval-api:
        condition: service_healthy

  retrieval-api:
    build: .
    command: ["sh", "./docker/entrypoints/retrieval-api.sh"]
    ports:
      - "8001:8001"
    environment:
      APP_VAR_ROOT: ${APP_VAR_ROOT:-/app/var}
      APP_DB_PATH: ${APP_DB_PATH:-/app/var/app.db}
      APP_UPLOAD_ROOT: ${APP_UPLOAD_ROOT:-/app/var/uploads}
      PROJECTS_ROOT: /data/projects
      PAGEINDEX_LLM_API_KEY: ${PAGEINDEX_LLM_API_KEY:-}
      PAGEINDEX_LLM_BASE_URL: ${PAGEINDEX_LLM_BASE_URL:-}
      VISION_MODEL: ${VISION_MODEL:-}
      VISION_EXTRACTION_ENABLED: ${VISION_EXTRACTION_ENABLED:-false}
    volumes:
      - ./var:/app/var
      - ${PROJECTS_ROOT:-./fixtures/projects}:/data/projects:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=2).read()\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  index-worker:
    build: .
    command: ["sh", "./docker/entrypoints/index-worker.sh"]
    environment:
      APP_VAR_ROOT: ${APP_VAR_ROOT:-/app/var}
      APP_DB_PATH: ${APP_DB_PATH:-/app/var/app.db}
      APP_UPLOAD_ROOT: ${APP_UPLOAD_ROOT:-/app/var/uploads}
      PROJECTS_ROOT: /data/projects
      PAGEINDEX_LLM_API_KEY: ${PAGEINDEX_LLM_API_KEY:-}
      PAGEINDEX_LLM_BASE_URL: ${PAGEINDEX_LLM_BASE_URL:-}
      VISION_MODEL: ${VISION_MODEL:-}
      VISION_EXTRACTION_ENABLED: ${VISION_EXTRACTION_ENABLED:-false}
      INDEX_DEBUG_METRICS: ${INDEX_DEBUG_METRICS:-false}
    volumes:
      - ./var:/app/var
      - ${PROJECTS_ROOT:-./fixtures/projects}:/data/projects:ro
    depends_on:
      retrieval-api:
        condition: service_healthy

  directory-watcher:
    build: .
    command: ["sh", "./docker/entrypoints/directory-watcher.sh"]
    environment:
      APP_VAR_ROOT: ${APP_VAR_ROOT:-/app/var}
      APP_DB_PATH: ${APP_DB_PATH:-/app/var/app.db}
      APP_UPLOAD_ROOT: ${APP_UPLOAD_ROOT:-/app/var/uploads}
      PROJECTS_ROOT: /data/projects
      DIRECTORY_SCAN_INTERVAL_SECONDS: ${DIRECTORY_SCAN_INTERVAL_SECONDS:-5}
    volumes:
      - ./var:/app/var
      - ${PROJECTS_ROOT:-./fixtures/projects}:/data/projects:ro
    depends_on:
      retrieval-api:
        condition: service_healthy
