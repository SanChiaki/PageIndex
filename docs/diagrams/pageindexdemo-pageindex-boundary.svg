  <rect class="node-orange" x="430" y="250" width="140" height="98"/>
  <text x="500" y="284" text-anchor="middle" class="node-title">索引任务编排</text>
  <text x="500" y="304" text-anchor="middle" class="node-sub">index_document.py</text>
