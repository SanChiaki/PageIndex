<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 860" width="960" height="860">
  <style>
    text {
      font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      fill: #111827;
    }
    .title { font-size: 24px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #6b7280; }
    .group-label { font-size: 12px; font-weight: 700; fill: #6b7280; letter-spacing: 0.08em; text-transform: uppercase; }
    .node-title { font-size: 15px; font-weight: 600; }
    .node-sub { font-size: 12px; fill: #6b7280; }
    .arrow-label { font-size: 11px; fill: #4b5563; }
    .legend { font-size: 12px; fill: #6b7280; }
    .note-title { font-size: 13px; font-weight: 700; fill: #92400e; }
    .note-body { font-size: 12px; fill: #78350f; }
    .group {
      fill: rgba(248, 250, 252, 0.9);
      stroke: #d1d5db;
      stroke-width: 1.5;
      stroke-dasharray: 8 6;
      rx: 18;
      ry: 18;
    }
    .node {
      fill: #ffffff;
      stroke: #d1d5db;
      stroke-width: 1.5;
      rx: 12;
      ry: 12;
    }
    .node-blue {
      fill: #eff6ff;
      stroke: #bfdbfe;
      stroke-width: 1.5;
      rx: 12;
      ry: 12;
    }
    .node-green {
      fill: #f0fdf4;
      stroke: #bbf7d0;
      stroke-width: 1.5;
      rx: 12;
      ry: 12;
    }
    .node-orange {
      fill: #fff7ed;
      stroke: #fed7aa;
      stroke-width: 1.5;
      rx: 12;
      ry: 12;
    }
    .node-purple {
      fill: #faf5ff;
      stroke: #ddd6fe;
      stroke-width: 1.5;
      rx: 12;
      ry: 12;
    }
    .node-teal {
      fill: #f0fdfa;
      stroke: #99f6e4;
      stroke-width: 1.5;
      rx: 12;
      ry: 12;
    }
  </style>

  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
  </defs>

  <rect width="960" height="860" fill="#ffffff"/>

  <text x="480" y="36" text-anchor="middle" class="title">PageIndexDemo / PageIndex 边界图</text>
  <text x="480" y="58" text-anchor="middle" class="subtitle">当前代码真实边界：PageIndex 负责索引构建与文档读取；项目管理、候选召回、页内取证、答案生成都在 Demo 包装层</text>

