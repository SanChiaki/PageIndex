<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1380" width="960" height="1380">
  <style>
    text {
      font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      fill: #111827;
    }
    .title { font-size: 24px; font-weight: 700; }
    .subtitle { font-size: 13px; fill: #6b7280; }
    .lane-label { font-size: 12px; font-weight: 600; fill: #6b7280; letter-spacing: 0.08em; text-transform: uppercase; }
    .node-title { font-size: 15px; font-weight: 600; }
    .node-sub { font-size: 12px; fill: #6b7280; }
    .arrow-label { font-size: 11px; fill: #4b5563; }
    .legend { font-size: 12px; fill: #6b7280; }
    .group {
      fill: rgba(248, 250, 252, 0.8);
      stroke: #d1d5db;
      stroke-width: 1.5;
      stroke-dasharray: 8 6;
      rx: 16;
      ry: 16;
    }
    .node {
      fill: #ffffff;
      stroke: #d1d5db;
      stroke-width: 1.5;
      rx: 10;
      ry: 10;
    }
    .node-blue {
      fill: #eff6ff;
      stroke: #bfdbfe;
      stroke-width: 1.5;
      rx: 10;
      ry: 10;
    }
    .node-orange {
      fill: #fff7ed;
      stroke: #fed7aa;
      stroke-width: 1.5;
      rx: 10;
      ry: 10;
    }
    .node-green {
      fill: #f0fdf4;
      stroke: #bbf7d0;
      stroke-width: 1.5;
      rx: 10;
      ry: 10;
    }
    .node-purple {
      fill: #faf5ff;
      stroke: #ddd6fe;
      stroke-width: 1.5;
      rx: 10;
      ry: 10;
    }
  </style>

  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
  </defs>

  <rect width="960" height="1380" fill="#ffffff"/>

  <text x="480" y="36" text-anchor="middle" class="title">PageIndexDemo 用户提问到最终回答流程</text>
  <text x="480" y="58" text-anchor="middle" class="subtitle">基于当前代码链路：ChatComposer → Next.js BFF → Retrieval API → PageIndex 检索 → 回写会话 → 聊天页渲染</text>

  <rect class="group" x="60" y="84" width="840" height="196"/>
  <text x="78" y="104" class="lane-label">Browser / UI</text>

  <rect class="group" x="60" y="314" width="840" height="300"/>
  <text x="78" y="334" class="lane-label">Next.js Web / BFF</text>

  <rect class="group" x="60" y="648" width="840" height="438"/>
  <text x="78" y="668" class="lane-label">Retrieval API / Query Engine</text>

  <rect class="group" x="60" y="1120" width="840" height="218"/>
  <text x="78" y="1140" class="lane-label">Return / Render</text>

  <polygon points="328,118 612,118 636,182 352,182" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="482" y="148" text-anchor="middle" class="node-title">用户提问</text>
  <text x="482" y="168" text-anchor="middle" class="node-sub">ChatComposer 收集 message + 选中项目</text>

  <polygon points="482,198 560,246 482,294 404,246" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="482" y="243" text-anchor="middle" class="node-title" font-size="14">已有会话？</text>

  <rect class="node-orange" x="112" y="352" width="236" height="78"/>
  <text x="230" y="382" text-anchor="middle" class="node-title">创建会话</text>
  <text x="230" y="402" text-anchor="middle" class="node-sub">POST /api/conversations</text>
  <text x="230" y="418" text-anchor="middle" class="node-sub">仅在 conversationId 缺失时执行</text>

  <rect class="node-blue" x="360" y="352" width="252" height="92"/>
  <text x="486" y="382" text-anchor="middle" class="node-title">发送消息</text>
  <text x="486" y="402" text-anchor="middle" class="node-sub">POST /api/chat/send</text>
  <text x="486" y="418" text-anchor="middle" class="node-sub">校验 conversationId / projectIds</text>
  <text x="486" y="434" text-anchor="middle" class="node-sub">写入用户消息，必要时更新标题</text>

  <rect class="node-blue" x="360" y="482" width="252" height="64"/>
  <text x="486" y="510" text-anchor="middle" class="node-title">调用检索服务</text>
  <text x="486" y="530" text-anchor="middle" class="node-sub">sendRetrievalQuery → /internal/retrieve/query</text>

  <g transform="translate(690,392)">
    <ellipse cx="88" cy="18" rx="88" ry="18" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
    <rect x="0" y="18" width="176" height="126" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
    <ellipse cx="88" cy="144" rx="88" ry="18" fill="#dcfce7" stroke="#bbf7d0" stroke-width="1.5"/>
    <text x="88" y="52" text-anchor="middle" class="node-title">SQLite app.db</text>
    <text x="88" y="74" text-anchor="middle" class="node-sub">conversations / messages</text>
    <text x="88" y="90" text-anchor="middle" class="node-sub">projects / conversation_projects</text>
    <text x="88" y="106" text-anchor="middle" class="node-sub">documents / document_indexes</text>
    <text x="88" y="122" text-anchor="middle" class="node-sub">pages_json / structure_json</text>
  </g>

  <rect class="node-orange" x="360" y="714" width="252" height="64"/>
  <text x="486" y="742" text-anchor="middle" class="node-title">接收查询</text>
  <text x="486" y="762" text-anchor="middle" class="node-sub">FastAPI /internal/retrieve/query</text>

  <rect class="node-green" x="360" y="810" width="252" height="70"/>
  <text x="486" y="838" text-anchor="middle" class="node-title">加载文档</text>
  <text x="486" y="858" text-anchor="middle" class="node-sub">按 projectIds 查询 ready 文档</text>

  <rect class="node-purple" x="360" y="910" width="252" height="74"/>
  <text x="486" y="938" text-anchor="middle" class="node-title">候选召回</text>
  <text x="486" y="958" text-anchor="middle" class="node-sub">select_candidate_documents</text>
  <text x="486" y="974" text-anchor="middle" class="node-sub">LLM description selection，失败回退关键词</text>

  <rect class="node-purple" x="360" y="1014" width="252" height="74"/>
  <text x="486" y="1042" text-anchor="middle" class="node-title">页内取证</text>
  <text x="486" y="1062" text-anchor="middle" class="node-sub">choose_page_window → get_page_content</text>
  <text x="486" y="1078" text-anchor="middle" class="node-sub">抽取 evidence blocks + focusPage + excerpt</text>

  <rect class="node-purple" x="360" y="1118" width="252" height="74"/>
  <text x="486" y="1146" text-anchor="middle" class="node-title">生成答案</text>
  <text x="486" y="1166" text-anchor="middle" class="node-sub">_generate_answer(query, context_blocks)</text>
  <text x="486" y="1182" text-anchor="middle" class="node-sub">同时 build citations 与 selectedDocuments</text>

  <rect class="node-blue" x="360" y="1218" width="252" height="78"/>
  <text x="486" y="1246" text-anchor="middle" class="node-title">回写并返回</text>
  <text x="486" y="1266" text-anchor="middle" class="node-sub">BFF 追加 assistant message + citations</text>
  <text x="486" y="1282" text-anchor="middle" class="node-sub">返回 answer / citations / selectedDocuments</text>

  <polygon points="328,1308 612,1308 636,1360 352,1360" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="482" y="1334" text-anchor="middle" class="node-title">最终回答</text>
  <text x="482" y="1352" text-anchor="middle" class="node-sub">router.push + router.refresh，聊天页渲染答案与引用</text>

  <line x1="482" y1="182" x2="482" y2="198" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="506" y="186" width="88" height="18" fill="#ffffff"/>
  <text x="550" y="199" text-anchor="middle" class="arrow-label">message + scope</text>

  <path d="M 404 246 H 230 V 352" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="276" y="222" width="32" height="18" fill="#ffffff"/>
  <text x="292" y="235" text-anchor="middle" class="arrow-label">否</text>

  <line x1="482" y1="294" x2="482" y2="352" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="494" y="318" width="32" height="18" fill="#ffffff"/>
  <text x="510" y="331" text-anchor="middle" class="arrow-label">是</text>

  <line x1="348" y1="391" x2="360" y2="391" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="270" y="374" width="64" height="18" fill="#ffffff"/>
  <text x="302" y="387" text-anchor="middle" class="arrow-label">conversationId</text>

  <line x1="486" y1="444" x2="486" y2="482" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="506" y="452" width="82" height="18" fill="#ffffff"/>
  <text x="547" y="465" text-anchor="middle" class="arrow-label">query + scope</text>

  <line x1="486" y1="546" x2="486" y2="714" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="498" y="620" width="108" height="18" fill="#ffffff"/>
  <text x="552" y="633" text-anchor="middle" class="arrow-label">HTTP JSON 请求</text>

  <line x1="486" y1="778" x2="486" y2="810" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="516" y="786" width="68" height="18" fill="#ffffff"/>
  <text x="550" y="799" text-anchor="middle" class="arrow-label">queryEngine</text>

  <line x1="486" y1="880" x2="486" y2="910" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="510" y="886" width="68" height="18" fill="#ffffff"/>
  <text x="544" y="899" text-anchor="middle" class="arrow-label">ready docs</text>

  <line x1="486" y1="984" x2="486" y2="1014" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="514" y="990" width="60" height="18" fill="#ffffff"/>
  <text x="544" y="1003" text-anchor="middle" class="arrow-label">top docs</text>

  <line x1="486" y1="1088" x2="486" y2="1118" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="502" y="1094" width="84" height="18" fill="#ffffff"/>
  <text x="544" y="1107" text-anchor="middle" class="arrow-label">evidence blocks</text>

  <line x1="486" y1="1192" x2="486" y2="1218" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="498" y="1195" width="108" height="18" fill="#ffffff"/>
  <text x="552" y="1208" text-anchor="middle" class="arrow-label">answer + citations</text>

  <line x1="486" y1="1296" x2="486" y2="1308" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="502" y="1294" width="98" height="18" fill="#ffffff"/>
  <text x="551" y="1307" text-anchor="middle" class="arrow-label">JSON → server render</text>

  <path d="M 612 404 C 650 404, 650 420, 690 420" fill="none" stroke="#059669" stroke-width="1.7" stroke-dasharray="6 4" marker-end="url(#arrow-green)"/>
  <rect x="620" y="392" width="108" height="18" fill="#ffffff"/>
  <text x="674" y="405" text-anchor="middle" class="arrow-label">read / write state</text>

  <path d="M 690 512 C 650 512, 640 840, 612 840" fill="none" stroke="#059669" stroke-width="1.7" marker-end="url(#arrow-green)"/>
  <rect x="642" y="660" width="92" height="18" fill="#ffffff"/>
  <text x="688" y="673" text-anchor="middle" class="arrow-label">ready docs</text>

  <path d="M 612 1256 C 650 1256, 650 540, 690 540" fill="none" stroke="#059669" stroke-width="1.7" stroke-dasharray="6 4" marker-end="url(#arrow-green)"/>
  <rect x="620" y="1194" width="118" height="18" fill="#ffffff"/>
  <text x="679" y="1207" text-anchor="middle" class="arrow-label">assistant msg + citations</text>

  <g transform="translate(710,1270)">
    <rect x="0" y="0" width="170" height="52" fill="#ffffff" stroke="#e5e7eb" rx="8" ry="8"/>
    <line x1="14" y1="16" x2="44" y2="16" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <text x="52" y="20" class="legend">主流程</text>
    <line x1="14" y1="32" x2="44" y2="32" stroke="#059669" stroke-width="1.7" marker-end="url(#arrow-green)"/>
    <text x="52" y="36" class="legend">SQLite 读取</text>
    <line x1="14" y1="46" x2="44" y2="46" stroke="#059669" stroke-width="1.7" stroke-dasharray="6 4" marker-end="url(#arrow-green)"/>
    <text x="52" y="50" class="legend">SQLite 写入</text>
  </g>
</svg>
