  <text x="324" y="644" text-anchor="middle" class="node-sub">挑选 excerpt / focusPage</text>

  <rect class="node-purple" x="422" y="560" width="148" height="90"/>
  <text x="496" y="592" text-anchor="middle" class="node-title">答案生成</text>
